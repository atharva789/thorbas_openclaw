services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # Gateway auth
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      # Model provider
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # GitHub (optional)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Omniclaw plugin config
      OMNICLAW_CLIENT_SECRET_PATH: ${OMNICLAW_CLIENT_SECRET_PATH:-/home/node/.openclaw/client_secret.json}
      OMNICLAW_TOKENS_PATH: ${OMNICLAW_TOKENS_PATH:-/home/node/.openclaw/omniclaw-tokens.json}
      # Playwright browser path
      PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
      # Job Automation
      JOB_SCRAPER_URL: http://job-scraper:8787
      JOB_TRACKER_SHEET_ID: ${JOB_TRACKER_SHEET_ID:-1EHOO6p87ERIgvmTkiSbn9kG__lSeStpwf8uV4Y-soS4}
    depends_on:
      job-scraper:
        condition: service_healthy
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/opt/openclaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/opt/openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      # Expose only on localhost. Access via SSH port forward.
      - "127.0.0.1:18789:18789"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Memory limit as safety net on 4GB VPS
    deploy:
      resources:
        limits:
          memory: 3G

  job-scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
