services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # Gateway auth
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      # Model provider
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # GitHub (optional)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Omniclaw plugin config
      OMNICLAW_CLIENT_SECRET_PATH: ${OMNICLAW_CLIENT_SECRET_PATH:-/home/node/.openclaw/client_secret.json}
      OMNICLAW_TOKENS_PATH: ${OMNICLAW_TOKENS_PATH:-/home/node/.openclaw/omniclaw-tokens.json}
      # Playwright browser path
      PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/opt/openclaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/opt/openclaw/workspace}:/home/node/.openclaw/workspace
    ports:
      # Expose only on localhost. Access via SSH port forward.
      - "127.0.0.1:18789:18789"
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Memory limit as safety net on 4GB VPS
    deploy:
      resources:
        limits:
          memory: 3G
